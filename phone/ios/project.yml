name: DigitalKeySDK
options:
  bundleIdPrefix: cn.digitalkey
  deploymentTarget:
    iOS: "14.0"
  xcodeVersion: "15.0"
  generateEmptyDirectories: true

settings:
  base:
    SWIFT_VERSION: "5.9"
    IPHONEOS_DEPLOYMENT_TARGET: "14.0"

targets:
  DigitalKeySDK:
    type: framework
    platform: iOS
    sources:
      - Sources/DigitalKeySDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.digitalkey.DigitalKeySDK
        INFOPLIST_FILE: Sources/DigitalKeySDK/Info.plist
        DEFINES_MODULE: YES
        SWIFT_EMIT_LOC_STRINGS: YES
        SWIFT_INSTALL_OBJC_HEADER: YES
        BUILD_LIBRARY_FOR_DISTRIBUTION: YES
        OTHER_LDFLAGS: ["-framework", "CoreNFC", "-framework", "CoreBluetooth", "-framework", "CoreLocation", "-framework", "Security", "-framework", "Network", "-framework", "CryptoKit"]
      configs:
        Debug:
          SWIFT_OPTIMIZATION_LEVEL: "-Onone"
          GCC_PREPROCESSOR_DEFINITIONS: ["DEBUG=1", "$(inherited)"]
        Release:
          SWIFT_OPTIMIZATION_LEVEL: "-O"
    dependencies:
      - framework: CoreNFC.framework
      - framework: CoreBluetooth.framework
      - framework: CoreLocation.framework
      - framework: Security.framework
      - framework: Network.framework
      - framework: CryptoKit.framework
    scheme:
      testTargets:
        - DigitalKeySDKTests
      gatherCoverageData: true

  DigitalKeySDKTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - Tests/DigitalKeySDKTests
    dependencies:
      - target: DigitalKeySDK
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: cn.digitalkey.DigitalKeySDKTests
        SWIFT_VERSION: "5.9"
