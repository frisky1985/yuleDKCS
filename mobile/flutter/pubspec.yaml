name: yuledkcs
description: YuleDKCS Digital Key SDK for Flutter using FFI
version: 1.0.0
homepage: https://github.com/nousresearch/yuleDKCS

environment:
  sdk: '>=3.0.0 <4.0.0'
  flutter: '>=3.10.0'

dependencies:
  flutter:
    sdk: flutter
  ffi: ^2.1.0
  path: ^1.8.3
  path_provider: ^2.1.1
  permission_handler: ^11.0.1
  flutter_blue_plus: ^1.20.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  plugin:
    platforms:
      android:
        package: com.nousresearch.yuledkcs
        pluginClass: YuleDkcsPlugin
      ios:
        pluginClass: YuleDkcsPlugin

platforms:
  android:
  ios:

repository: https://github.com/nousresearch/yuleDKCS
issue_tracker: https://github.com/nousresearch/yuleDKCS/issues