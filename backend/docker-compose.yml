version: '3.8'

services:
  api:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: yuledkcs-api
    ports:
      - "8080:8080"
    environment:
      - YULEDKCS_SERVER_PORT=8080
      - YULEDKCS_SERVER_MODE=release
      - YULEDKCS_DATABASE_HOST=postgres
      - YULEDKCS_DATABASE_PORT=5432
      - YULEDKCS_DATABASE_USER=postgres
      - YULEDKCS_DATABASE_PASSWORD=postgres
      - YULEDKCS_DATABASE_DBNAME=yuledkcs
      - YULEDKCS_REDIS_HOST=redis
      - YULEDKCS_REDIS_PORT=6379
      - YULEDKCS_JWT_SECRET=your-production-secret-key
    depends_on:
      postgres:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - yuledkcs-network
    restart: unless-stopped

  postgres:
    image: postgres:16-alpine
    container_name: yuledkcs-postgres
    environment:
      - POSTGRES_USER=postgres
      - POSTGRES_PASSWORD=postgres
      - POSTGRES_DB=yuledkcs
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./migrations:/docker-entrypoint-initdb.d
    networks:
      - yuledkcs-network
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 5s
      retries: 5
    restart: unless-stopped

  redis:
    image: redis:7-alpine
    container_name: yuledkcs-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    networks:
      - yuledkcs-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:

networks:
  yuledkcs-network:
    driver: bridge