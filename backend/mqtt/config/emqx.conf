# EMQ X 配置文件
# yuleDKCS MQTT Broker 配置

## 基本配置
node {
    name = "emqx@127.0.0.1"
    cookie = "yuleDKCS-mqtt-secret-cookie"
    data_dir = "data"
}

## 网络配置
dashboard {
    listeners.http {
        bind = 18083
    }
    default_username = "admin"
    default_password = "${EMQX_ADMIN_PASSWORD}"
}

## MQTT 监听器
listeners.tcp.default {
    bind = "0.0.0.0:1883"
    max_connections = 10000
}

## MQTT over TLS
listeners.ssl.default {
    bind = "0.0.0.0:8883"
    ssl_options {
        certfile = "etc/certs/server.crt"
        keyfile = "etc/certs/server.key"
        cacertfile = "etc/certs/ca.crt"
        verify = verify_none
    }
}

## WebSocket
listeners.ws.default {
    bind = "0.0.0.0:8083"
    max_connections = 5000
}

## WebSocket over TLS
listeners.wss.default {
    bind = "0.0.0.0:8084"
    ssl_options {
        certfile = "etc/certs/server.crt"
        keyfile = "etc/certs/server.key"
        cacertfile = "etc/certs/ca.crt"
        verify = verify_none
    }
}

## 认证配置
authentication {
    mechanism = jwt
    backend = builtin_jwt
    secret = "${JWT_SECRET}"
    algorithm = hmac-sha256
    secret_base64_encoded = false
    verify_claims {
        sub = "${username}"
    }
}

## 禁用匿名登录
allow_anonymous = false

## 授权配置 (ACL)
authorization {
    sources = [
        {
            type = file
            file = "etc/acl.conf"
        }
    ]
    no_match = deny
    deny_action = ignore
}

## 连接限制
zone.default {
    max_connections = 10000
    max_clientid_len = 65535
    max_topic_levels = 128
    max_qos_allowed = 2
    max_topic_alias = 65535
    retain_available = true
    wildcard_subscription = true
    shared_subscription = true
}

## 会话配置
zone.default.session {
    max_subscriptions = infinity
    upgrade_qos = off
    max_inflight = 32
    retry_interval = 30s
    max_awaiting_rel = 100
    await_rel_timeout = 300s
    session_expiry_interval = 2h
    max_mqueue_len = 1000
    mqueue_priorities = disabled
    mqueue_default_priority = lowest
    mqueue_store_qos0 = true
}

## 消息持久化
zone.default.persistence {
    store_method = builtin
    store_batch_size = 100
}

## 日志配置
log {
    level = warning
    to = [console, file]
    rotation {
        enable = true
        size = 100MB
        count = 10
    }
}

## 推送消息配置
sys_topics {
    sys_msg_interval = 1m
    sys_heartbeat_interval = 30s
    sys_event_messages {
        client_connected = true
        client_disconnected = true
        client_subscribed = false
        client_unsubscribed = false
    }
}

## WebHook 配置 (可选)
webhook {
    url = "http://backend:8080/api/v1/mqtt/webhook"
    headers {
        Authorization = "Bearer ${WEBHOOK_TOKEN}"
    }
    pool_size = 32
    enable_pipelining = 100
    connect_timeout = 15s
    max_retries = 3
    retry_interval = 1s
    events = [
        "client.connected",
        "client.disconnected",
        "message.publish",
        "message.delivered"
    ]
}

## 规则引擎 (可选)
rule_engine {
    ignore_sys_message = true
    rules = []
}
