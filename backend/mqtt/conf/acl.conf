%% EMQ X ACL Configuration for yuleDKCS
%% Format: {allow|deny, Who, Access, Topics}

%% Allow admin users to subscribe and publish to any topic
{allow, {user, "admin"}, subscribe, ["#"]}.
{allow, {user, "admin"}, publish, ["#"]}.

%% Allow system monitoring
{allow, {user, "monitor"}, subscribe, ["$SYS/#", "$broadcast/#"]}.

%% Deny access to system topics for regular users
{deny, all, subscribe, ["$SYS/#"]}.
{deny, all, publish, ["$SYS/#"]}.

%% Deny subscription to shared topics with wrong format
{deny, all, subscribe, ["$share/#"]}.

%% Allow vehicle-specific topics
%% Pattern: vehicle/{vehicle_id}/command
%% Pattern: vehicle/{vehicle_id}/status
%% Pattern: vehicle/{vehicle_id}/telemetry
{allow, all, subscribe, ["vehicle/+/status"]}.
{allow, all, subscribe, ["vehicle/+/telemetry"]}.
{allow, all, publish, ["vehicle/+/command"]}.
{allow, all, publish, ["vehicle/+/response"]}.

%% Allow user-specific topics
%% Pattern: user/{user_id}/notification
%% Pattern: user/{user_id}/command
{allow, all, subscribe, ["user/+/notification"]}.
{allow, all, publish, ["user/+/command"]}.

%% Allow OTA related topics
%% Pattern: ota/{vehicle_id}/update
%% Pattern: ota/{vehicle_id}/progress
{allow, all, subscribe, ["ota/+/progress"]}.
{allow, all, publish, ["ota/+/update"]}.

%% Allow key management topics
%% Pattern: key/{key_id}/status
%% Pattern: key/{key_id}/command
{allow, all, subscribe, ["key/+/status"]}.
{allow, all, publish, ["key/+/command"]}.

%% Deny all other subscriptions by default
{deny, all, subscribe, ["#"]}.

%% Allow publish to specific topics (REST API verification required)
{allow, all, publish, ["vehicle/+/command"]}.
{allow, all, publish, ["vehicle/+/response"]}.
{allow, all, publish, ["user/+/command"]}.
{allow, all, publish, ["ota/+/update"]}.
{allow, all, publish, ["key/+/command"]}.

%% Deny all other publishes
{deny, all}.
