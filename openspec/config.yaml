schema: spec-driven
context: |
  ## 技术栈
  - Runtime: Node.js v22, Python 3.14
  - Testing: Jest, Pytest
  - Framework: OpenClaw skills system
  - Package: npm, pip

  ## 开发工作流
  - 使用 Superpowers 技能进行 brainstorm 和规划
  - 使用 Harness Engineering 模式组织文档
  - 所有变更必须遵循 OpenSpec 规格驱动流程

  ## 文档位置
  - 设计文档: docs/plans/
  - 架构文档: docs/agent/
  - 活跃变更: openspec/changes/

  ## 质量门禁
  - 所有代码变更必须有测试
  - 所有文档必须有 owner 和 last_reviewed
  - 提交前运行 agent_repo_check.py

  ## 技能协作
  - Harness Engineering: 提供基础设施 (AGENTS.md, docs/agent/)
  - Superpowers: 提供开发工作流 (Brainstorm → Plan → Build)
  - OpenSpec: 提供规格管理 (proposal → specs → design → tasks)

rules:
  proposal:
    - 必须包含背景和目标
    - 必须包含回滚计划
    - 必须关联 docs/plans/ 设计文档（如有）
  specs:
    - 使用 Given/When/Then 格式
    - 每个 spec 必须可测试
    - 使用 RFC 2119 关键词 (SHALL/MUST/SHOULD/MAY)
  design:
    - 必须说明技术方案
    - 必须考虑边界情况
    - 必须考虑安全和可靠性
  tasks:
    - 每个任务 2-5 分钟可完成
    - 必须包含测试步骤
    - 必须标记为 [ ] 或 [x]
