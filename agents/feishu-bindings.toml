# 飞书通道绑定配置
# 用于多智能体项目团队的消息通知

# 主项目群 - 所有核心角色
[[bindings]]
agent = "pm_project"
channel = "feishu"
target = "项目核心群ID"

[[bindings]]
agent = "pm_product"
channel = "feishu"
target = "项目核心群ID"

[[bindings]]
agent = "arch"
channel = "feishu"
target = "项目核心群ID"

# 开发群 - 开发团队
[[bindings]]
agent = "frontend"
channel = "feishu"
target = "开发团队群ID"

[[bindings]]
agent = "backend"
channel = "feishu"
target = "开发团队群ID"

[[bindings]]
agent = "embedded"
channel = "feishu"
target = "开发团队群ID"

# 代码检视群
[[bindings]]
agent = "code_reviewer"
channel = "feishu"
target = "代码检视群ID"

# 测试群
[[bindings]]
agent = "test_frontend"
channel = "feishu"
target = "测试团队群ID"

[[bindings]]
agent = "test_backend"
channel = "feishu"
target = "测试团队群ID"

[[bindings]]
agent = "test_embedded"
channel = "feishu"
target = "测试团队群ID"

# 仓库管理群
[[bindings]]
agent = "repo_manager"
channel = "feishu"
target = "运维发布群ID"

# 说明：
# 1. 请将 "xxx群ID" 替换为实际的飞书群聊ID
# 2. 可以通过飞书开放平台获取群ID
# 3. 也可以配置为个人用户ID实现私聊通知
