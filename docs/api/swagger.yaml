openapi: 3.0.3
info:
  title: Yule DKCS API
  description: |
    数字车钥匙服务 (Digital Key Cloud Service) API 文档
    
    提供车辆管理、数字钥匙、OTA升级、WebSocket实时通信等功能。
    
    ## 认证方式
    本API使用 JWT Bearer Token 进行认证。请在请求头中添加：
    ```
    Authorization: Bearer {your_token}
    ```
  version: 1.0.0
  contact:
    name: API Support
    email: support@yuledkcs.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080/api/v1
    description: 本地开发环境
  - url: https://api.yuledkcs.com/api/v1
    description: 生产环境

tags:
  - name: 认证
    description: 用户认证相关接口
  - name: 用户
    description: 用户信息管理
  - name: 车辆
    description: 车辆注册、状态查询、控制命令
  - name: 钥匙
    description: 数字钥匙发行、分享、管理
  - name: OTA
    description: 固件管理和OTA升级
  - name: WebSocket
    description: 实时通信接口

paths:
  # ========== 健康检查 ==========
  /health:
    get:
      tags:
        - 系统
      summary: 健康检查
      description: 检查服务是否正常运行
      responses:
        '200':
          description: 服务正常
          content:
            application/json:
              schema:
                type: object
                properties:
                  status:
                    type: string
                    example: ok
                  time:
                    type: object

  /api/v1/ping:
    get:
      tags:
        - 系统
      summary: 测试接口
      description: 简单的连通性测试
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: pong

  # ========== 认证 ==========
  /api/v1/auth/register:
    post:
      tags:
        - 认证
      summary: 用户注册
      description: 注册新用户账号
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/RegisterRequest'
      responses:
        '201':
          description: 注册成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: User registered successfully
        '400':
          $ref: '#/components/responses/BadRequest'
        '409':
          description: 用户名或邮箱已存在

  /api/v1/auth/login:
    post:
      tags:
        - 认证
      summary: 用户登录
      description: 使用用户名和密码登录，获取JWT令牌
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/LoginRequest'
      responses:
        '200':
          description: 登录成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  message:
                    type: string
                    example: Login successful
                  token:
                    type: string
                    description: JWT访问令牌
                    example: eyJhbGciOiJIUzI1NiIs...
        '401':
          $ref: '#/components/responses/Unauthorized'

  /api/v1/auth/refresh:
    post:
      tags:
        - 认证
      summary: 刷新令牌
      description: 使用刷新令牌获取新的访问令牌
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 刷新成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  token:
                    type: string
                    description: 新的JWT访问令牌

  # ========== 用户 ==========
  /api/v1/user/profile:
    get:
      tags:
        - 用户
      summary: 获取用户资料
      description: 获取当前登录用户的信息
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/User'
        '401':
          $ref: '#/components/responses/Unauthorized'

  # ========== 车辆 ==========
  /api/v1/vehicles:
    post:
      tags:
        - 车辆
      summary: 注册车辆
      description: 注册一辆新车辆到用户账号
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleRegisterRequest'
      responses:
        '201':
          description: 车辆注册成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/Vehicle'
        '400':
          $ref: '#/components/responses/BadRequest'
        '401':
          $ref: '#/components/responses/Unauthorized'

    get:
      tags:
        - 车辆
      summary: 获取用户车辆列表
      description: 获取当前用户的所有车辆，支持分页
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
          description: 页码
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
          description: 每页数量
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  vehicles:
                    type: array
                    items:
                      $ref: '#/components/schemas/VehicleResponse'
                  total:
                    type: integer
                  page:
                    type: integer
                  pageSize:
                    type: integer

  /api/v1/vehicles/{id}:
    get:
      tags:
        - 车辆
      summary: 获取车辆详情
      description: 获取指定车辆的详细信息
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
          description: 车辆ID
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  /api/v1/vehicles/{id}/status:
    get:
      tags:
        - 车辆
      summary: 获取车辆实时状态
      description: 获取车辆的实时状态信息
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleStatusResponse'

  /api/v1/vehicles/{id}/command:
    post:
      tags:
        - 车辆
      summary: 发送车辆控制命令
      description: |
        向车辆发送控制命令。支持的命令：
        - `unlock` - 解锁车辆
        - `lock` - 锁定车辆
        - `engine_start` - 启动引擎
        - `engine_stop` - 停止引擎
        - `trunk` - 开启后备箱
        - `windows_up` - 升起车窗
        - `windows_down` - 降下车窗
        - `find_my_car` - 寻车
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleCommandRequest'
      responses:
        '202':
          description: 命令已接受
          content:
            application/json:
              schema:
                type: object
                properties:
                  command_id:
                    type: integer
                  status:
                    type: string
                  request_id:
                    type: string

  /api/v1/vehicles/{id}/location:
    put:
      tags:
        - 车辆
      summary: 更新车辆位置
      description: 更新车辆当前位置（由车机调用）
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/VehicleLocationRequest'
      responses:
        '200':
          description: 位置更新成功

  /api/v1/vehicles/{id}/status/update:
    put:
      tags:
        - 车辆
      summary: 车辆上报状态
      description: 车辆主动上报当前状态（由车机调用）
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [online, offline, locked, unlocked, active, inactive, maintenance]
                lock_state:
                  type: string
                battery_level:
                  type: integer
                charging_state:
                  type: string
      responses:
        '200':
          description: 状态更新成功

  /api/v1/commands/{command_id}:
    get:
      tags:
        - 车辆
      summary: 获取命令执行结果
      description: 查询车辆控制命令的执行结果
      security:
        - bearerAuth: []
      parameters:
        - name: command_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/VehicleCommandResponse'
        '404':
          $ref: '#/components/responses/NotFound'

  # ========== 钥匙 ==========
  /api/v1/keys:
    get:
      tags:
        - 钥匙
      summary: 获取用户钥匙列表
      description: 获取当前用户的所有数字钥匙
      security:
        - bearerAuth: []
      parameters:
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    type: object
                    properties:
                      list:
                        type: array
                        items:
                          $ref: '#/components/schemas/KeyResponse'
                      total:
                        type: integer
                      page:
                        type: integer
                      page_size:
                        type: integer

  /api/v1/keys/issue:
    post:
      tags:
        - 钥匙
      summary: 发行新钥匙
      description: 为指定车辆发行数字钥匙
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/IssueKeyRequest'
      responses:
        '201':
          description: 钥匙发行成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/KeyResponse'

  /api/v1/keys/{id}:
    get:
      tags:
        - 钥匙
      summary: 获取钥匙详情
      description: 获取指定钥匙的详细信息
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  message:
                    type: string
                  data:
                    $ref: '#/components/schemas/KeyResponse'
        '404':
          description: 钥匙不存在

    delete:
      tags:
        - 钥匙
      summary: 撤销钥匙
      description: 撤销指定的数字钥匙
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 钥匙已撤销

  /api/v1/keys/{id}/share:
    post:
      tags:
        - 钥匙
      summary: 分享钥匙
      description: 将钥匙分享给其他用户
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShareKeyRequest'
      responses:
        '201':
          description: 分享成功

  /api/v1/keys/{id}/permissions:
    put:
      tags:
        - 钥匙
      summary: 更新钥匙权限
      description: 修改钥匙的操作权限
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdatePermissionsRequest'
      responses:
        '200':
          description: 权限更新成功

  /api/v1/keys/shared/list:
    get:
      tags:
        - 钥匙
      summary: 获取收到的分享钥匙
      description: 获取其他用户分享给当前用户的钥匙
      security:
        - bearerAuth: []
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  code:
                    type: integer
                  data:
                    type: array
                    items:
                      $ref: '#/components/schemas/KeyShare'

  /api/v1/keys/{id}/shares:
    get:
      tags:
        - 钥匙
      summary: 获取钥匙分享列表
      description: 获取指定钥匙的所有分享记录
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  /api/v1/keys/shares/{share_id}:
    delete:
      tags:
        - 钥匙
      summary: 撤销分享
      description: 撤销指定的钥匙分享
      security:
        - bearerAuth: []
      parameters:
        - name: share_id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 分享已撤销

  # ========== OTA ==========
  /api/v1/ota/firmwares:
    post:
      tags:
        - OTA
      summary: 创建固件
      description: 上传新固件信息
      security:
        - bearerAuth: []
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/Firmware'
      responses:
        '201':
          description: 固件创建成功

    get:
      tags:
        - OTA
      summary: 列出固件
      description: 获取固件列表，支持按类型筛选
      security:
        - bearerAuth: []
      parameters:
        - name: type
          in: query
          schema:
            type: string
            enum: [ecu, ivi, tbox, adas, gateway, bms]
        - name: page
          in: query
          schema:
            type: integer
            default: 1
        - name: page_size
          in: query
          schema:
            type: integer
            default: 10
      responses:
        '200':
          description: 成功

  /api/v1/ota/firmwares/{id}:
    get:
      tags:
        - OTA
      summary: 获取固件详情
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

    put:
      tags:
        - OTA
      summary: 更新固件
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 更新成功

    delete:
      tags:
        - OTA
      summary: 删除固件
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 删除成功

  /api/v1/ota/firmwares/{id}/deactivate:
    put:
      tags:
        - OTA
      summary: 停用固件
      description: 停用指定固件，使其不再可用于更新
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 停用成功

  /api/v1/ota/firmwares/{id}/download:
    post:
      tags:
        - OTA
      summary: 下载固件
      description: 获取固件下载链接
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/OTADownloadRequest'
      responses:
        '200':
          description: 成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  download_url:
                    type: string

  /api/v1/ota/check:
    post:
      tags:
        - OTA
      summary: 检查更新 (POST)
      description: 检查是否有可用固件更新
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/CheckUpdateRequest'
      responses:
        '200':
          description: 检查完成

  /api/v1/ota/updates:
    get:
      tags:
        - OTA
      summary: 检查更新 (GET)
      description: 通过查询参数检查更新
      parameters:
        - name: current_version
          in: query
          required: true
          schema:
            type: string
        - name: hardware_version
          in: query
          required: true
          schema:
            type: string
        - name: firmware_type
          in: query
          required: true
          schema:
            type: string
        - name: vehicle_id
          in: query
          schema:
            type: integer
      responses:
        '200':
          description: 检查完成

  /api/v1/vehicles/{id}/ota/status:
    get:
      tags:
        - OTA
      summary: 获取车辆OTA状态
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

    put:
      tags:
        - OTA
      summary: 更新车辆OTA状态
      description: 上报OTA更新进度
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/UpdateOTAStatusRequest'
      responses:
        '200':
          description: 更新成功

  /api/v1/vehicles/{id}/ota/start:
    post:
      tags:
        - OTA
      summary: 开始OTA更新
      description: 触发车辆OTA更新流程
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                target_version:
                  type: string
      responses:
        '200':
          description: OTA开始

  /api/v1/vehicles/{id}/ota/history:
    get:
      tags:
        - OTA
      summary: 获取OTA历史记录
      security:
        - bearerAuth: []
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
      responses:
        '200':
          description: 成功

  # ========== WebSocket ==========
  /ws:
    get:
      tags:
        - WebSocket
      summary: WebSocket连接
      description: |
        建立WebSocket连接用于实时通信。
        
        ## 连接方式
        - 用户连接: `/ws?token={jwt_token}&vehicle_id={optional}`
        - 车辆连接: `/ws/vehicle/{id}?token={vehicle_token}`
        - 管理员连接: `/ws/admin?token={admin_token}`
        
        ## 消息类型
        - `status` - 车辆状态更新
        - `command` - 控制命令
        - `location` - 位置更新
        - `notification` - 系统通知
        - `heartbeat` - 心跳消息
        
      parameters:
        - name: token
          in: query
          schema:
            type: string
          description: JWT认证令牌
        - name: vehicle_id
          in: query
          schema:
            type: integer
          description: 可选，指定订阅的车辆
      responses:
        '101':
          description: WebSocket连接已升级

components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT
      description: JWT访问令牌

  schemas:
    # ========== 通用 ==========
    ErrorResponse:
      type: object
      properties:
        code:
          type: integer
        message:
          type: string
        error:
          type: string

    # ========== 认证 ==========
    LoginRequest:
      type: object
      required:
        - username
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: johndoe
        password:
          type: string
          minLength: 6
          format: password
          example: password123

    RegisterRequest:
      type: object
      required:
        - username
        - email
        - password
      properties:
        username:
          type: string
          minLength: 3
          maxLength: 50
          example: johndoe
        email:
          type: string
          format: email
          example: john@example.com
        password:
          type: string
          minLength: 6
          format: password
          example: password123

    # ========== 用户 ==========
    User:
      type: object
      properties:
        id:
          type: integer
        username:
          type: string
        email:
          type: string
        phone:
          type: string
        created_at:
          type: string
          format: date-time
        updated_at:
          type: string
          format: date-time

    # ========== 车辆 ==========
    Vehicle:
      type: object
      properties:
        id:
          type: integer
