# Production values for yuledkcs

replicaCount: 3

image:
  repository: yuledkcs/backend
  tag: "v1.0.0"
  pullPolicy: Always

resources:
  requests:
    memory: "512Mi"
    cpu: "500m"
  limits:
    memory: "1Gi"
    cpu: "1000m"

autoscaling:
  enabled: true
  minReplicas: 3
  maxReplicas: 20
  targetCPUUtilizationPercentage: 60
  targetMemoryUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 2

livenessProbe:
  initialDelaySeconds: 60

readinessProbe:
  initialDelaySeconds: 10

configMap:
  APP_ENV: "production"
  APP_DEBUG: "false"
  LOG_LEVEL: "warn"
  ENABLE_METRICS: "true"
  ENABLE_TRACING: "true"

ingress:
  enabled: true
  className: "nginx"
  annotations:
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    nginx.ingress.kubernetes.io/force-ssl-redirect: "true"
    nginx.ingress.kubernetes.io/proxy-body-size: "50m"
    nginx.ingress.kubernetes.io/rate-limit: "200"
    nginx.ingress.kubernetes.io/proxy-buffering: "on"
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
    nginx.ingress.kubernetes.io/configuration-snippet: |
      proxy_set_header X-Request-ID $req_id;
      proxy_set_header X-Real-IP $remote_addr;
  hosts:
    - host: yuledkcs.example.com
      paths:
        - path: /
          pathType: Prefix
  tls:
    - secretName: yuledkcs-prod-tls-secret
      hosts:
        - yuledkcs.example.com

postgresql:
  enabled: true
  auth:
    username: postgres
    password: "" # Use existing secret
    existingSecret: "postgresql-credentials"
  primary:
    persistence:
      enabled: true
      storageClass: "standard"
      size: 50Gi
    resources:
      requests:
        memory: "1Gi"
        cpu: "500m"
      limits:
        memory: "2Gi"
        cpu: "1000m"

redis:
  enabled: true
  master:
    persistence:
      enabled: true
      storageClass: "standard"
      size: 10Gi
    resources:
      requests:
        memory: "256Mi"
        cpu: "200m"
      limits:
        memory: "512Mi"
        cpu: "400m"

affinity:
  podAntiAffinity:
    requiredDuringSchedulingIgnoredDuringExecution:
      - labelSelector:
          matchExpressions:
            - key: app.kubernetes.io/name
              operator: In
              values:
                - yuledkcs
        topologyKey: kubernetes.io/hostname
