apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: yuledkcs-backend-hpa
  namespace: yuledkcs
spec:
  minReplicas: 1
  maxReplicas: 3
  metrics:
    - type: Resource
      resource:
        name: cpu
        target:
          type: Utilization
          averageUtilization: 80
