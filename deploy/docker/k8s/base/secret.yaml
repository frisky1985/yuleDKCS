apiVersion: v1
kind: Secret
metadata:
  name: yuledkcs-secrets
  namespace: yuledkcs
  labels:
    app.kubernetes.io/name: yuledkcs
    app.kubernetes.io/component: secret
type: Opaque
stringData:
  # Database credentials - Base64 encoded in real deployment
  DB_USERNAME: "postgres"
  DB_PASSWORD: "changeme-in-production"
  
  # API Keys - Replace with actual secrets
  API_SECRET_KEY: "your-secret-key-here"
  JWT_SECRET: "your-jwt-secret-here"
  
  # External service credentials
  EXTERNAL_API_KEY: "your-external-api-key"
---
apiVersion: v1
kind: Secret
metadata:
  name: postgresql-credentials
  namespace: yuledkcs
  labels:
    app.kubernetes.io/name: postgresql
    app.kubernetes.io/component: database
type: Opaque
stringData:
  POSTGRES_USER: "postgres"
  POSTGRES_PASSWORD: "changeme-in-production"
  POSTGRES_DB: "yuledkcs"
