apiVersion: kustomize.config.k8s.io/v1beta1
kind: Kustomization

namespace: yuledkcs-staging

namePrefix: staging-

commonLabels:
  environment: staging
  tier: staging

resources:
  - ../../base

patchesStrategicMerge:
  - configmap-patch.yaml
  - deployment-patch.yaml
  - ingress-patch.yaml

configMapGenerator:
  - name: yuledkcs-config
    behavior: merge
    literals:
      - APP_ENV=staging
      - APP_DEBUG=false
      - LOG_LEVEL=info

replicas:
  - name: yuledkcs-backend
    count: 2

images:
  - name: yuledkcs/backend
    newTag: staging-latest
