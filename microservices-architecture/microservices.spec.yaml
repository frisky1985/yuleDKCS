meta:
  title: 微服务架构图
  theme: tech-blue
  layout: horizontal
  profile: engineering-review
modules:
  - id: gateway
    label: API Gateway
  - id: services
    label: Services
  - id: infra
    label: Infrastructure
  - id: data
    label: Data Layer
nodes:
  - id: api-gateway
    label: API Gateway
    type: service
    module: gateway
    position:
      x: 80
      'y': 120
    size: large
  - id: user-service
    label: User Service
    type: service
    module: services
    position:
      x: 280
      'y': 80
    size: medium
  - id: order-service
    label: Order Service
    type: service
    module: services
    position:
      x: 280
      'y': 200
    size: medium
  - id: auth-service
    label: Auth Service
    type: service
    module: services
    position:
      x: 280
      'y': 320
    size: medium
  - id: redis
    label: Redis Cache
    type: process
    module: infra
    position:
      x: 480
      'y': 80
    size: medium
  - id: mq
    label: |-
      Message Queue
      (RabbitMQ)
    type: queue
    module: infra
    position:
      x: 480
      'y': 200
    size: medium
  - id: load-balancer
    label: Load Balancer
    type: cloud
    module: infra
    position:
      x: 480
      'y': 320
    size: medium
  - id: user-db
    label: |-
      User DB
      (PostgreSQL)
    type: database
    module: data
    position:
      x: 680
      'y': 80
    size: medium
  - id: order-db
    label: |-
      Order DB
      (PostgreSQL)
    type: database
    module: data
    position:
      x: 680
      'y': 200
    size: medium
  - id: config-server
    label: Config Server
    type: service
    module: data
    position:
      x: 680
      'y': 320
    size: medium
edges:
  - from: load-balancer
    to: api-gateway
    type: primary
    label: HTTPS
  - from: api-gateway
    to: user-service
    type: primary
    label: REST/gRPC
  - from: api-gateway
    to: order-service
    type: primary
    label: REST/gRPC
  - from: api-gateway
    to: auth-service
    type: primary
    label: OAuth2
  - from: order-service
    to: user-service
    type: optional
    label: User Info
  - from: order-service
    to: mq
    type: primary
    label: Events
  - from: user-service
    to: redis
    type: data
    label: Session
  - from: auth-service
    to: redis
    type: data
    label: Token
  - from: user-service
    to: user-db
    type: data
    label: CRUD
  - from: order-service
    to: order-db
    type: data
    label: CRUD
  - from: user-service
    to: config-server
    type: dependency
    label: Config
  - from: order-service
    to: config-server
    type: dependency
    label: Config
