syntax = "proto3";

package digitalkey.hub.v1;

option go_package = "github.com/digitalkey/hub/api/v1";

// ============================================================
// HUB统一模型 - 跨协议转换的核心数据结构
// ============================================================

// 协议类型
enum Protocol {
    PROTOCOL_UNSPECIFIED = 0;
    CCC_DK3             = 1;  // CCC Digital Key 3.0
    ICCOA_DK30          = 2;  // ICCOA DK 3.0
    ICCOA_DK40          = 3;  // ICCOA DK 4.0
    ICCE                = 4;  // ICCE
}

// 手机厂商
enum PhoneVendor {
    VENDOR_UNSPECIFIED = 0;
    APPLE              = 1;
    SAMSUNG            = 2;
    XIAOMI             = 3;
    OPPO               = 4;
    VIVO               = 5;
    HUAWEI             = 6;
}

// 密钥类型
enum KeyType {
    KEY_TYPE_UNSPECIFIED = 0;
    OWNER                = 1;  // 车主密钥
    FRIEND               = 2;  // 朋友密钥
    SERVICE              = 3;  // 服务密钥(代客泊车等)
    TEMPORARY            = 4;  // 临时密钥
}

// 密钥状态
enum KeyStatus {
    KEY_STATUS_UNSPECIFIED = 0;
    ACTIVE                 = 1;
    SUSPENDED              = 2;
    REVOKED                = 3;
    EXPIRED                = 4;
}

// 权限位掩码
message AccessLevel {
    bool lock     = 1;
    bool unlock   = 2;
    bool engine   = 3;
    bool trunk    = 4;
    bool window   = 5;
    bool climate  = 6;
    bool find     = 7;
    bool seat     = 8;
}

// 统一密钥模型
message DigitalKey {
    string      key_id         = 1;
    string      vehicle_id     = 2;
    string      device_id      = 3;
    string      user_id        = 4;
    KeyType     key_type       = 5;
    Protocol    protocol       = 6;
    AccessLevel access_level   = 7;
    int32       distance_limit = 8;   // mm, 0=无限制
    TimeRestriction time_restriction = 9;
    int32       max_uses       = 10;
    int32       used_count     = 11;
    int32       key_version    = 12;
    KeyStatus   status         = 13;
    int64       valid_from     = 14;  // unix timestamp
    int64       valid_until    = 15;
    int64       created_at     = 16;
}

message TimeRestriction {
    repeated int32 weekdays = 1;  // 1-7
    string start_time       = 2;  // "08:00"
    string end_time         = 3;  // "18:00"
}

// ============================================================
// 密钥绑定服务
// ============================================================

service KeyManagementService {
    // 密钥绑定
    rpc BindKey(BindKeyRequest) returns (BindKeyResponse);
    // 密钥解绑
    rpc UnbindKey(UnbindKeyRequest) returns (UnbindKeyResponse);
    // 密钥挂起/恢复
    rpc SuspendKey(SuspendKeyRequest) returns (SuspendKeyResponse);
    rpc ResumeKey(ResumeKeyRequest) returns (ResumeKeyResponse);
    // 密钥撤销
    rpc RevokeKey(RevokeKeyRequest) returns (RevokeKeyResponse);
    // 密钥续期
    rpc RenewKey(RenewKeyRequest) returns (RenewKeyResponse);
    // 查询密钥
    rpc GetKey(GetKeyRequest) returns (GetKeyResponse);
    rpc ListKeys(ListKeysRequest) returns (ListKeysResponse);
}

message BindKeyRequest {
    string    vehicle_id    = 1;
    string    device_id     = 2;
    string    user_id       = 3;
    PhoneVendor vendor      = 4;
    Protocol  protocol      = 5;
    KeyType   key_type      = 6;
    AccessLevel access_level = 7;
    bytes     device_pubkey = 8;   // 设备SE公钥 (DER)
    int64     valid_from    = 9;
    int64     valid_until   = 10;
    string    trace_id      = 11;
}

message BindKeyResponse {
    DigitalKey key            = 1;
    bytes      vehicle_pubkey = 2;  // 车端公钥
    bytes      shared_secret  = 3;  // ECDH共享密钥(加密)
    string     error_code     = 4;
    string     error_msg      = 5;
}

message UnbindKeyRequest {
    string key_id    = 1;
    string trace_id  = 2;
}

message UnbindKeyResponse {
    string error_code = 1;
}

message SuspendKeyRequest {
    string key_id    = 1;
    string reason    = 2;
    string trace_id  = 3;
}

message SuspendKeyResponse {
    string error_code = 1;
}

message ResumeKeyRequest {
    string key_id    = 1;
    string trace_id  = 2;
}

message ResumeKeyResponse {
    string error_code = 1;
}

message RevokeKeyRequest {
    string key_id      = 1;
    string reason      = 2;
    string trace_id    = 3;
}

message RevokeKeyResponse {
    string error_code = 1;
}

message RenewKeyRequest {
    string key_id      = 1;
    int64  valid_until = 2;
    string trace_id    = 3;
}

message RenewKeyResponse {
    DigitalKey key       = 1;
    string error_code    = 2;
}

message GetKeyRequest {
    string key_id = 1;
}

message GetKeyResponse {
    DigitalKey key      = 1;
    string error_code   = 2;
}

message ListKeysRequest {
    string    vehicle_id  = 1;
    string    user_id     = 2;
    KeyStatus status      = 3;
    int32     page_size   = 4;
    string    page_token  = 5;
}

message ListKeysResponse {
    repeated DigitalKey keys      = 1;
    string              next_token = 2;
    int32               total     = 3;
}

// ============================================================
// 密钥分享服务
// ============================================================

service KeyShareService {
    rpc CreateShare(CreateShareRequest) returns (CreateShareResponse);
    rpc AcceptShare(AcceptShareRequest) returns (AcceptShareResponse);
    rpc CancelShare(CancelShareRequest) returns (CancelShareResponse);
    rpc GetShare(GetShareRequest) returns (GetShareResponse);
}

message CreateShareRequest {
    string      key_id        = 1;
    string      from_user_id  = 2;
    PhoneVendor to_vendor     = 3;
    string      to_user_id    = 4;  // 可选,为空则生成分享码
    AccessLevel access_level  = 5;
    int64       valid_from    = 6;
    int64       valid_until   = 7;
    int32       max_uses      = 8;
    string      trace_id      = 9;
}

message CreateShareResponse {
    string share_id   = 1;
    string share_code = 2;  // 6位数字分享码 (为空to_user_id时生成)
    string error_code = 3;
}

message AcceptShareRequest {
    string      share_code    = 1;
    string      device_id     = 2;
    string      user_id       = 3;
    PhoneVendor vendor        = 4;
    bytes       device_pubkey = 5;
    string      trace_id      = 6;
}

message AcceptShareResponse {
    DigitalKey key         = 1;
    bytes      shared_secret = 2;
    string     error_code  = 3;
}

message CancelShareRequest {
    string share_id  = 1;
    string trace_id  = 2;
}

message CancelShareResponse {
    string error_code = 1;
}

message GetShareRequest {
    string share_id = 1;
}

message GetShareResponse {
    string share_id       = 1;
    string key_id         = 2;
    string from_user_id   = 3;
    AccessLevel access_level = 4;
    int64  valid_from     = 5;
    int64  valid_until    = 6;
    string error_code     = 7;
}

// ============================================================
// 车辆远程控制服务
// ============================================================

service VehicleControlService {
    rpc SendCommand(ControlCommandRequest) returns (ControlCommandResponse);
    rpc StreamStatus(VehicleStatusRequest) returns (stream VehicleStatusUpdate);
}

message ControlCommandRequest {
    string vehicle_id = 1;
    string user_id    = 2;
    string key_id     = 3;
    string action     = 4;  // unlock/lock/engine_on/engine_off/trunk/climate/find
    bytes  params     = 5;  // JSON params
    int32  source     = 6;  // 1=NFC 2=BLE 3=UWB 4=Remote 5=Edge
    string trace_id   = 7;
}

message ControlCommandResponse {
    string  cmd_id      = 1;
    int32   result_code = 2;
    string  error_msg   = 3;
}

message VehicleStatusRequest {
    string vehicle_id = 1;
}

message VehicleStatusUpdate {
    string vehicle_id    = 1;
    int32  lock_status   = 2;
    int32  engine_status = 3;
    int32  door_status   = 4;
    int32  window_status = 5;
    int32  battery_pct   = 6;
    int32  interior_temp = 7;
    int32  alarm_status  = 8;
    double latitude      = 9;
    double longitude     = 10;
    int64  timestamp     = 11;
}

// ============================================================
// HUB私有协议 - DKCS <-> HUB通信
// ============================================================

service HubTransportService {
    // DKCS调用HUB: 转发到手机厂商云端
    rpc ForwardToVendor(ForwardRequest) returns (ForwardResponse);
    // 手机厂商回调HUB
    rpc VendorCallback(CallbackRequest) returns (CallbackResponse);
    // 健康检查
    rpc HealthCheck(HealthCheckRequest) returns (HealthCheckResponse);
}

message ForwardRequest {
    PhoneVendor vendor    = 1;
    Protocol    protocol  = 2;
    string      operation = 3;  // bind/unbind/auth/share/revoke/notify
    bytes       payload   = 4;  // 厂商私有协议payload
    string      trace_id  = 5;
}

message ForwardResponse {
    bytes  payload    = 1;  // 厂商响应 (协议转换后)
    string error_code = 2;
    string error_msg  = 3;
}

message CallbackRequest {
    PhoneVendor vendor     = 1;
    Protocol    protocol   = 2;
    string      operation  = 3;
    bytes       payload    = 4;
    string      callback_id = 5;
}

message CallbackResponse {
    string error_code = 1;
}

message HealthCheckRequest {}

message HealthCheckResponse {
    bool   healthy         = 1;
    repeated AdapterStatus adapters = 2;
}

message AdapterStatus {
    string vendor         = 1;
    string protocol       = 2;
    bool   healthy        = 3;
    int64  last_check_ms  = 4;
    string error_msg      = 5;
}
