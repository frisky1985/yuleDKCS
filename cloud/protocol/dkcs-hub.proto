// DKCS <-> HUB 私有协议规范
// 版本: 1.0.0
// 传输: gRPC (HTTP/2)
// 安全: mTLS双向认证

syntax = "proto3";

package digitalkey.protocol.v1;

option go_package = "github.com/digitalkey/protocol/v1";

// ============================================================
// 通用头部 (每条消息都携带)
// ============================================================

message Header {
    string trace_id = 1;           // 链路追踪ID (UUID)
    string span_id = 2;             // 当前Span ID
    int64  timestamp = 3;          // Unix毫秒时间戳
    string version = 4;            // 协议版本 "1.0.0"
    string app_id = 5;              // 应用标识
    string device_id = 6;          // 设备ID
}

message ResponseHeader {
    Header request_header = 1;
    int32  result_code = 2;         // 0=成功
    string result_msg = 3;         // 错误描述
    string trace_id = 2;           // 响应trace_id
}

// ============================================================
// 消息封装 (Request/Response通用)
// ============================================================

message Envelope {
    Header header = 1;
    
    oneof payload {
        // Key Management
        KeyBindReq      key_bind_req = 10;
        KeyBindResp     key_bind_resp = 11;
        KeyUnbindReq    key_unbind_req = 12;
        KeyUnbindResp   key_unbind_resp = 13;
        KeyRevokeReq    key_revoke_req = 14;
        KeyRevokeResp   key_revoke_resp = 15;
        KeyListReq     key_list_req = 16;
        KeyListResp    key_list_resp = 17;
        
        // Key Share
        KeyShareCreateReq    share_create_req = 20;
        KeyShareCreateResp   share_create_resp = 21;
        KeyShareAcceptReq    share_accept_req = 22;
        KeyShareAcceptResp   share_accept_resp = 23;
        
        // Vehicle Control
        VehicleCommandReq     vehicle_command_req = 30;
        VehicleCommandResp    vehicle_command_resp = 31;
        VehicleStatusReport vehicle_status_report = 32;
        
        // HUB Callbacks
        VendorCallbackReq     vendor_callback_req = 40;
        VendorCallbackResp   vendor_callback_resp = 41;
    }
}

// ============================================================
// 1. 密钥绑定 (Key Bind)
// ============================================================

message KeyBindReq {
    Header header = 1;
    
    string vehicle_id = 10;        // 车厂系统车辆ID
    string vin = 11;               // 车辆VIN码
    string device_id = 12;         // 手机设备ID
    string user_id = 13;            // 用户ID
    
    string vendor = 20;            // 手机厂商: apple/samsung/xiaomi/oppo/vivo/huawei
    string protocol = 21;           // 协议: ccc_dk3/iccoa_dk30/iccoa_dk40/icce
    string key_type = 22;           // 密钥类型: owner/friend/service/temporary
    
    int32  access_level = 23;       // 权限位掩码
    
    bytes device_pubkey = 30;      // 手机SE公钥 (DER, AES-256-GCM加密)
    bytes device_cert = 31;         // 手机SE证书链
    
    int64  valid_from = 40;        // 生效时间戳
    int64  valid_until = 41;      // 过期时间戳
    int32  max_uses = 42;         // 最大使用次数, -1=无限制
    
    int32  distance_limit = 50;   // 距离限制(mm), -1=无限制
    
    map<string, string> extensions = 100; // 扩展字段
}

message KeyBindResp {
    ResponseHeader resp_header = 1;
    
    string key_id = 10;           // 云端生成的密钥ID
    bytes vehicle_pubkey = 11;   // 车端公钥 (DER)
    bytes shared_secret = 12;      // ECDH共享密钥 (HSM加密)
    bytes vehicle_cert = 13;      // 车端证书
    
    int32BLE status = 20;        // 0=成功绑定 1=待手机确认 2=绑定中
    map<string, string> extensions = 100;
}

// ============================================================
// 2. 密钥解绑 (Key Unbind)
// ============================================================

message KeyUnbindReq {
    Header header = 1;
    string key_id = 10;
    string vehicle_id = 11;
    string reason = 20;
}

message KeyUnbindResp {
    ResponseHeader resp_header = 1;
    int32 status = 10;            // 0=成功
}

// ============================================================
// 3. 密钥撤销 (Key Revoke)
// ============================================================

message KeyRevokeReq {
    Header header = 1;
    string key_id = 10;
    string vehicle_id = 11;
    string reason = 20;
    bool emergency = 21;          // 紧急撤销: 立即生效
}

message KeyRevokeResp {
    ResponseHeader resp_header = 1;
    int32 status = 10;
    int64 revoked_at = 11;
}

// ============================================================
// 4. 密钥列表 (Key List)
// ============================================================

message KeyListReq {
    Header header = 1;
    string vehicle_id = 10;
    string user_id = 11;
    string status = 12;          // active/suspended/revoked
    int32 page = 20;
    int32 page_size = 21;
}

message KeyListResp {
    ResponseHeader resp_header = 1;
    repeated KeyInfo keys = 10;
    int32 total = 11;
    int32 page = 12;
    int32 page_size = 13;
    bool has_more = 14;
}

message KeyInfo {
    string key_id = 10;
    string vehicle_id = 11;
    string device_id = 12;
    string user_id = 13;
    string key_type = 14;
    string protocol = 15;
    string status = 16;
    int32 access_level = 17;
    int64 valid_from = 20;
    int64 valid_until = 21;
    int32 used_count = 22;
}

// ============================================================
// 5. 密钥分享创建 (Share Create)
// ============================================================

message KeyShareCreateReq {
    Header header = 1;
    string key_id = 10;
    string from_user_id = 11;
    string to_user_id = 20;       // 指定接收人
    string to_vendor = 21;        // 接收人厂商 (可选)
    string access_level = 22;
    int64 valid_from = 30;
    int64 valid_until = 31;
    int32 max_uses = 32;
}

message KeyShareCreateResp {
    ResponseHeader resp_header = 1;
    string share_id = 10;
    string share_code = 11;       // 6位数字分享码
    bytes share_url = 12;        // 分享链接
}

// ============================================================
// 6. 密钥分享接受 (Share Accept)
// ============================================================

message KeyShareAcceptReq {
    Header header = 1;
    string share_code = 10;       // 6位码 或 share_id
    string device_id = 11;
    string user_id = 12;
    string vendor = 13;
    bytes device_pubkey = 14;
}

message KeyShareAcceptResp {
    ResponseHeader resp_header = 1;
    string key_id = 10;
    bytes shared_secret = 11;
    int32 status = 20;           // 0=成功 1=已接受 2=已过期
}

// ============================================================
// 7. 车辆控制指令 (Vehicle Command)
// ============================================================

message VehicleCommandReq {
    Header header = 1;
    
    string vehicle_id = 10;
    string cmd_id = 11;          // 指令ID (UUID)
    string key_id = 12;         // 使用的密钥
    
    string action = 20;          // unlock/lock/engine_on/engine_off/trunk/window/climate/find/horn
    map<string, string> params = 21; // 参数: {"window": "front_left"}
    
    int32 source = 30;           // 1=NFC 2=BLE 3=UWB 4=Remote 5=Edge
    
    bool wait_response = 40;       // 是否等待车端响应
    int32 timeout_ms = 41;       // 超时时间
}

message VehicleCommandResp {
    ResponseHeader resp_header = 1;
    string cmd_id = 10;
    int32 status = 11;          // 0=发送成功 1=执行中 2=已执行 3=失败 4=超时
    int32 result_code = 12;      // 车端返回码
    string result_msg = 13;
    int64 executed_at = 14;
}

// ============================================================
// 8. 车辆状态上报 (Vehicle Status Report)
// ============================================================

message VehicleStatusReport {
    Header header = 1;
    
    string vehicle_id = 10;
    string tcu_id = 11;         // TCU设备ID
    
    int32 lock_status = 20;     // 0=解锁 1=闭锁
    int32 engine_status = 21;    // 0=熄火 1=运行
    int32 door_status = 22;      // 位掩码: 四门+后备箱
    int32 window_status = 23;    // 位掩码
    
    int32 battery_pct = 30;    // 电量百分比
    int32 interior_temp = 31;   // 车内温度(0.1°C)
    int32 odometer_km = 32;      // 里程(km)
    int32 alarm_status = 33;      // 报警状态
    
    double latitude = 40;
    double longitude = 41;
    int64 reported_at = 50;     // 车端上报时间
}

// ============================================================
// 9. 手机厂商回调 (Vendor Callback)
// ============================================================

message VendorCallbackReq {
    Header header = 1;
    
    string callback_id = 10;   // 回调ID
    string operation = 11;     // 回调操作类型
    
    oneof payload {
        bytes bind_response = 20;
        bytes unbind_response = 21;
        bytes share_response = 22;
        bytes notify_payload = 23;
    }
    
    bytes signature = 30;      // 厂商签名
}

message VendorCallbackResp {
    ResponseHeader resp_header = 1;
    int32 status = 10;
}

// ============================================================
// 错误码定义
// ============================================================

// Common errors (0xxx)
const int32 ERR_SUCCESS = 0;
const int32 ERR_INVALID_REQUEST = 1001;
const int32 ERR_INVALID_SIGNATURE = 1002;
const int32 ERR_EXPIRED = 1003;
const int32 ERR_RATE_LIMIT = 1004;
const int32 ERR_INTERNAL = 1999;

// Key errors (2xxx)
const int32 ERR_KEY_NOT_FOUND = 2001;
const int32 ERR_KEY_EXISTS = 2002;
const int32 ERR_KEY_EXPIRED = 2003;
const int32 ERR_KEY_REVOKED = 2004;
const int32 ERR_KEY_SUSPENDED = 2005;
const int32 ERR_MAX_KEYS_REACHED = 2006;
const int32 ERR_NO_PERMISSION = 2007;

// Vehicle errors (3xxx)
const int32 ERR_VEHICLE_NOT_FOUND = 3001;
const int32 ERR_VEHICLE_OFFLINE = 3002;
const int32 ERR_TCU_TIMEOUT = 3003;
const int32 ERR_COMMAND_FAILED = 3004;

// Vendor errors (4xxx)
const int32 ERR_VENDOR_ADAPTER_NOT_FOUND = 4001;
const int32 ERR_VENDOR_API_ERROR = 4002;
const int32 ERR_VENDOR_TIMEOUT = 4003;